<!DOCTYPE html>
<html>
<head>
  <title>Best TV</title>
</head>
<body>

<h1>📺 Best TV</h1>
<button onclick="load()">Load Channels</button>

<div id="channels"></div>

<script>
async function load() {
  try {
    const res = await fetch("https://gist.githubusercontent.com/hama77/ba9f9ceef8bf9ccef211579ef2a73f96/raw/9bee3652423c5f3c9350091cfdbc5ce80f78d4ac/channels.json");
    const data = await res.json();

    const container = document.getElementById("channels");
    container.innerHTML = "";

    data.forEach(item => {
      const div = document.createElement("div");

      div.innerHTML = `
        <h3>${item.name}</h3>
        <a href="${item.url}" target="_blank">▶ تشغيل</a>
        <hr>
      `;

      container.appendChild(div);
    });

  } catch (error) {
    document.getElementById("channels").innerHTML = "❌ خطأ في تحميل القنوات";
    console.error(error);
  }
}
</script>

</body>
</html>
